<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Frame Guide - 내성적 유혹자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-900: #0a0e17;
            --navy-800: #0f1623;
            --navy-700: #151d2e;
            --navy-600: #1a2540;
            --text-white: #ffffff;
            --text-off-white: #e8eaed;
            --text-gray: #9ca3af;
            --accent-gold: #c9a55a;
            --accent-gold-dim: rgba(201, 165, 90, 0.15);
            --border-dark: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--navy-900);
            color: var(--text-off-white);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* 공통 레이아웃 */
        .container-custom { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
        
        /* 헤더 & 진행바 */
        .header { background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-dark); }
        .progress-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(90deg, var(--accent-gold), #dabb78); z-index: 101; transition: width 0.3s; }

        /* 탭 시스템 */
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 전자책 리더 스타일 */
        .serif { font-family: 'Noto Serif KR', serif; }
        .reader-content .rp { margin-bottom: 1.8rem; text-align: justify; word-break: keep-all; }
        .hook { font-style: italic; border-left: 3px solid var(--accent-gold); padding: 1.5rem 2rem; margin: 2rem 0; background: rgba(201, 165, 90, 0.05); color: var(--text-white); }
        .key-block { background: var(--navy-800); border: 1px solid var(--border-dark); border-radius: 12px; padding: 2rem; margin: 2rem 0; }
        .sub-title { font-size: 1.25rem; font-weight: 600; color: var(--accent-gold); margin: 3rem 0 1.5rem; border-bottom: 1px solid var(--border-dark); padding-bottom: 0.5rem; }

        /* 매트릭스 & 단계 도표 */
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border-dark); border-radius: 8px; overflow: hidden; }
        .matrix-cell { background: var(--navy-700); padding: 1.5rem; text-align: center; }
        .matrix-cell.highlight { border: 1px solid var(--accent-gold); background: var(--navy-600); }
        
        .stage-item { display: flex; gap: 1rem; margin-bottom: 1.5rem; position: relative; }
        .stage-dot { width: 32px; height: 32px; background: var(--navy-600); border-radius: 50%; display: flex; items-center; justify-content: center; flex-shrink: 0; font-weight: bold; font-size: 0.8rem; }
        .stage-dot.active { background: var(--accent-gold); color: var(--navy-900); }

        /* 하단 네비게이션 */
        .nav-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy-800); border-top: 1px solid var(--border-dark); padding: 1rem 0; }
        
        /* 버튼 스타일 */
        .btn-gold { background: linear-gradient(135deg, var(--accent-gold), #b38f45); color: var(--navy-900); font-weight: 700; border-radius: 9999px; transition: transform 0.2s; }
        .btn-gold:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="progress-bar" id="progressBar"></div>

    <header class="header">
        <div class="container-custom py-4 flex justify-between items-center">
            <button onclick="changeTab('reader', 1)" class="text-xl serif font-bold text-gold" style="font-family: 'Dancing Script'; color: var(--accent-gold);">The Frame Guide</button>
            <nav class="flex gap-6 text-sm font-medium">
                <button onclick="changeTab('reader')" class="nav-link active" id="tabReaderBtn">가이드</button>
                <button onclick="changeTab('description')" class="nav-link text-gray-500" id="tabDescBtn">전략설계</button>
            </nav>
        </div>
    </header>

    <main class="py-12 pb-32">
        <div id="tabReader" class="tab-content active">
            <div class="container-custom">
                <div id="readerUI">
                    <div class="text-center mb-12">
                        <span id="chapterNum" class="text-xs tracking-widest text-gold uppercase text-yellow-600">CHAPTER 01</span>
                        <h1 id="chapterTitle" class="text-2xl md:text-3xl font-bold serif mt-4">진단이 알려준 것, 그리고 알려주지 않은 것</h1>
                        <div class="w-10 h-px bg-yellow-600 mx-auto mt-6"></div>
                    </div>
                    
                    <div id="readerBody" class="reader-content serif text-lg leading-relaxed">
                        </div>
                </div>
            </div>
        </div>

        <div id="tabDescription" class="tab-content">
            <div class="container-custom">
                <div class="text-center mb-12">
                    <span class="text-xs tracking-widest text-yellow-600 uppercase">Consulting</span>
                    <h1 class="text-3xl font-bold serif mt-4">당신의 케이스를 위한 정밀 전략</h1>
                    <div class="w-10 h-px bg-yellow-600 mx-auto mt-6"></div>
                </div>

                <div class="space-y-8">
                    <div class="key-block border-2 border-yellow-600/30">
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-xl font-bold">연애 전략설계 패키지</h2>
                            <span class="text-xl font-bold text-yellow-600">109,000원</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-6">음성 통화 + 정밀 진단 문서 + 전자책 2종 포함</p>
                        <ul class="space-y-3 text-sm mb-8">
                            <li class="flex items-center gap-2"><i class="fas fa-check text-yellow-600"></i> 40분 심층 음성 코칭</li>
                            <li class="flex items-center gap-2"><i class="fas fa-check text-yellow-600"></i> 맞춤형 실행 원칙 & 금지 행동 가이드 문서</li>
                            <li class="flex items-center gap-2"><i class="fas fa-check text-yellow-600"></i> <strong>전자책 《내성적 유혹자》 무료 제공</strong></li>
                            <li class="flex items-center gap-2"><i class="fas fa-check text-yellow-600"></i> <strong>전자책 《침묵의 기술》 무료 제공</strong></li>
                        </ul>
                        <a href="https://tally.so/r/RG0QZv" target="_blank" class="btn-gold block w-full py-4 text-center">전략설계 상담 신청하기</a>
                    </div>

                    <div class="key-block">
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-xl font-bold">프레임 마스터 전자책</h2>
                            <span class="text-xl font-bold text-gray-300">29,000원~</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-6">스스로 연애의 뼈대를 세우고 싶은 분들을 위한 가이드</p>
                        <a href="https://uvhktjqm.gensparkspace.com/index-v2.html" target="_blank" class="border border-gray-600 block w-full py-4 text-center rounded-full hover:bg-gray-800 transition">전자책 리스트 보기</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="readerNav" class="nav-footer">
        <div class="container-custom flex justify-between items-center">
            <button id="prevBtn" onclick="movePage(-1)" class="text-gray-500 hover:text-white disabled:opacity-0"><i class="fas fa-chevron-left mr-2"></i> 이전</button>
            <div id="pageDots" class="flex gap-2"></div>
            <button id="nextBtn" onclick="movePage(1)" class="text-yellow-600 font-bold">다음 <i class="fas fa-chevron-right ml-2"></i></button>
        </div>
    </footer>

    <script>
        // 1. 데이터 정의 (존댓말 반영)
        const ebookPages = {
            1: {
                number: "CHAPTER 01",
                title: "진단이 알려준 것, 그리고 알려주지 않은 것",
                content: `
                    <div class="rp serif text-xl text-white mt-8">방금 진단 결과에 '저가치고안전', '2단계 정체', '행동자신감 정밀 판정 필요' 같은 표현이 보였을 것입니다.</div>
                    <p class="rp">무슨 내용인지 이해가 되지 않아도 괜찮습니다. 어차피 진단은 짧은 사연을 통해서 한정된 정보를 토대로 대부분의 내용을 추측해서 작성했습니다. 부족한 부분이 있었을 것입니다.</p>
                    <p class="rp">걱정하지 않아도 됩니다. <strong>3가지 실제 사례를 통해서 이론을 이해시키고, 직접 스스로의 상황을 평가할 수 있도록</strong> 해주겠습니다.</p>
                    <div class="key-block">
                        <p class="text-center mb-4">이 가이드를 읽고 나면 두 가지가 달라집니다.</p>
                        <ul class="space-y-4 text-sm">
                            <li><strong>첫째, 왜 항상 같은 지점에서 멈추는지가 보입니다.</strong> 과거의 실패도, 지금의 정체도 전부 하나의 패턴으로 설명됩니다.</li>
                            <li><strong>둘째, 주변의 모든 연애가 다르게 보이기 시작합니다.</strong> "걔한테 잘해줬는데 왜 안 되지?"라는 질문에 명확한 구조적 답을 내릴 수 있습니다.</li>
                        </ul>
                    </div>
                    <p class="rp text-center font-bold text-yellow-600 mt-8">10분이면 충분합니다. 시작합니다.</p>
                `
            },
            2: {
                number: "CHAPTER 02",
                title: "잘해줄수록 멀어지는 구조",
                content: `
                    <p class="rp">세 사람의 실제 사례를 보겠습니다.</p>
                    <div class="space-y-4 mb-8">
                        <div class="bg-navy-800 p-4 border-l-2 border-yellow-600">
                            <strong>A씨: 2년째 같은 자리</strong><br><span class="text-sm text-gray-400">그녀만을 위해 2년간 헌신했으나, 그녀는 그를 "원래 주변에 다 잘해주는 사람"으로 분류했습니다.</span>
                        </div>
                        <div class="bg-navy-800 p-4 border-l-2 border-yellow-600">
                            <strong>B씨: 침묵의 반복</strong><br><span class="text-sm text-gray-400">매주 기회가 있지만 "이상하게 보일까봐" 말을 걸지 못했고, 침묵이 두 사람의 기본값이 되었습니다.</span>
                        </div>
                        <div class="bg-navy-800 p-4 border-l-2 border-yellow-600">
                            <strong>C씨: 갑작스러운 고백</strong><br><span class="text-sm text-gray-400">편안함이 쌓이지 않은 상태에서 4단계(관계확정)로 직행했다 거절당했습니다. 지금은 다시 '그냥 편한 사람'입니다.</span>
                        </div>
                    </div>
                    <h3 class="sub-title">본능의 두 가지 계산</h3>
                    <div class="hook">"이 남자에게 끌리는가(가치)" / "이 남자가 안전한가(안전)"</div>
                    <p class="rp">여자의 뇌는 이 두 가지를 무의식적으로 계산합니다. A, B, C씨는 모두 <strong>'저가치고안전'</strong>, 즉 편하지만 끌리지 않는 남자의 사분면에 갇혀 있었습니다.</p>
                    <div class="matrix-grid mt-6">
                        <div class="matrix-cell text-xs">고가치저안전<br>(불안한 매력)</div>
                        <div class="matrix-cell highlight text-xs font-bold text-yellow-600">고가치고안전<br>(목표: ★)</div>
                        <div class="matrix-cell text-xs opacity-50">저가치저안전<br>(관심 밖)</div>
                        <div class="matrix-cell text-xs">저가치고안전<br>(편한 남자)</div>
                    </div>
                `
            },
            3: {
                number: "CHAPTER 03",
                title: "편한 사이에서 '남자'로 넘어가는 벽",
                content: `
                    <p class="rp">관계에는 순서가 있고, 대부분은 2단계와 3단계 사이의 거대한 벽에서 멈춥니다.</p>
                    <div class="stages-container mt-8">
                        <div class="stage-item"><div class="stage-dot">1</div><div><strong>존재 인식:</strong> 풍경이 아닌 사람으로 인지됨</div></div>
                        <div class="stage-item"><div class="stage-dot active">2</div><div><strong>편안함:</strong> 경계심 해제 (A, C씨 정체구간)</div></div>
                        <div class="stage-item"><div class="stage-dot" style="border:1px solid var(--accent-gold)">3</div><div><strong class="text-yellow-600">끌림:</strong> 남자로 보이기 시작하는 텐션</div></div>
                        <div class="stage-item"><div class="stage-dot">4</div><div><strong>관계 확정:</strong> 연인으로의 정의</div></div>
                    </div>
                    <div class="hook">"시간은 당신 편이 아닙니다."</div>
                    <p class="rp">편안함(2단계)에 머무는 시간이 길어질수록 '편한 사람'이라는 카테고리는 시멘트처럼 굳어집니다. 착하게 대해줄수록 벽은 더 단단해집니다. 이것이 <strong>'좋은 사람인데 왜 안 끌리지?'</strong>의 정체입니다.</p>
                `
            },
            4: {
                number: "CHAPTER 04",
                title: "알면서 못 하는 이유",
                content: `
                    <p class="rp">구조를 알아도 몸이 움직이지 않는 것은 성격 결함이 아닙니다.</p>
                    <div class="key-block">
                        <ul class="space-y-4">
                            <li>🛡️ <strong>거절 내성:</strong> 거절을 존재의 부정으로 인식함</li>
                            <li>✨ <strong>불완전 허용:</strong> 완벽한 타이밍만 기다리다 기회를 놓침</li>
                            <li>🎯 <strong>과정 몰입:</strong> 결과(사귀기)에만 집착해 지금의 진전을 무시함</li>
                        </ul>
                    </div>
                    <p class="rp">이것은 과거의 경험이 만든 뇌의 패턴일 뿐입니다. 어디가 막혀 있는지 정확히 진단하고 패턴을 교정하면 실행력은 반드시 살아납니다.</p>
                `
            },
            5: {
                number: "CHAPTER 05",
                title: "그래서, 당신은 지금 무엇을 하겠습니까",
                content: `
                    <div class="text-center py-8">
                        <p class="rp text-xl">구조는 이제 보였습니다.</p>
                        <p class="rp">왜 멈췄는지, 왜 안 통했는지 알았다면 이제 선택해야 합니다.</p>
                        <div class="spacer-lg"></div>
                        <p class="serif text-2xl text-yellow-600 font-bold mb-12">그래서, 당신은 지금 무엇을 하겠습니까.</p>
                        <button onclick="changeTab('description')" class="btn-gold px-12 py-5 text-xl">내 상황에 맞는 전략 설계하기 <i class="fas fa-arrow-right ml-2"></i></button>
                    </div>
                `
            }
        };

        // 2. 상태 관리
        let currentPage = 1;
        const totalPages = 5;

        // 3. 페이지 이동 함수
        function movePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderPage();
            }
        }

        function renderPage() {
            const page = ebookPages[currentPage];
            document.getElementById('chapterNum').textContent = page.number;
            document.getElementById('chapterTitle').textContent = page.title;
            document.getElementById('readerBody').innerHTML = page.content;

            // UI 업데이트
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').style.display = (currentPage === totalPages ? 'none' : 'inline-block');
            document.getElementById('progressBar').style.width = `${(currentPage / totalPages) * 100}%`;
            
            renderDots();
            window.scrollTo(0, 0);
        }

        function renderDots() {
            const container = document.getElementById('pageDots');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const dot = document.createElement('div');
                dot.className = `w-1.5 h-1.5 rounded-full ${i === currentPage ? 'bg-yellow-600 scale-125' : 'bg-gray-700'}`;
                container.appendChild(dot);
            }
        }

        // 4. 탭 전환
        function changeTab(tabId, page = null) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active', 'text-white'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.add('text-gray-500'));

            if (tabId === 'reader') {
                document.getElementById('tabReader').classList.add('active');
                document.getElementById('tabReaderBtn').classList.add('active', 'text-white');
                document.getElementById('readerNav').style.display = 'block';
                if (page) {
                    currentPage = page;
                    renderPage();
                }
            } else {
                document.getElementById('tabDescription').classList.add('active');
                document.getElementById('tabDescBtn').classList.add('active', 'text-white');
                document.getElementById('readerNav').style.display = 'none';
            }
            window.scrollTo(0, 0);
        }

        // 초기 실행
        renderPage();
    </script>
</body>
</html>
